<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mashin Centre — Sign In</title>
    <link rel="stylesheet" href="css/js-extras.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body id="top" class="page-login">
    <div class="top-arrow">
      <a href="#top"><i class="fa-solid fa-arrow-up"></i></a>
    </div>

    <header>
      <div class="container">
        <div class="navbar">
          <a href="index.html" class="logo" aria-label="Mashin Centre home">
            <span class="logo-mark" aria-hidden="true"><i class="fa-solid fa-car-side"></i></span>
            <span class="logo-text">Mashin</span>
          </a>
          <button type="button" class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="main-nav">
            <i class="fa-solid fa-bars"></i>
          </button>
          <nav class="main-nav" id="main-nav">
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">About</a></li>
              <li><a href="rentals.html">Car Rentals</a></li>
              <li><a href="booking.html">My Bookings</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </nav>
          <div class="header-actions">
            <div class="search-box">
              <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
              <input type="search" placeholder="Search products..." aria-label="Search products" />
            </div>
            <a href="#" class="btn-login" id="open-login-btn">Login</a>
          </div>
        </div>
      </div>
    </header>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="login-modal">
        <button type="button" class="modal-close" id="close-login" aria-label="Close">&times;</button>
        <div class="modal-header">
          <h2 class="modal-title">Welcome Back</h2>
          <p class="modal-subtitle">Sign in to your account</p>
        </div>

        <form class="modal-form" id="login-form" novalidate>
          <div class="form-field">
            <label class="form-field-label" for="login-email">Email Address</label>
            <div class="form-input-wrap">
              <input
                type="email"
                id="login-email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-field">
            <label class="form-field-label" for="login-password">Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="login-password"
                class="form-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-pw" aria-label="Show or hide password" data-pw-target="login-password">
                <i class="fa-regular fa-eye-slash"></i>
              </button>
            </div>
          </div>

          <div class="form-row">
            <label class="remember-label">
              <input type="checkbox" class="remember-checkbox" name="remember" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-modal-submit">Sign In</button>

          <p class="modal-switch-text">
            Don't have an account?
            <a href="#" class="modal-switch-link" id="go-to-register">Sign Up</a>
          </p>
        </form>
      </div>

      <div class="modal modal-hidden" id="register-modal">
        <button type="button" class="modal-close" id="close-register" aria-label="Close">&times;</button>
        <div class="modal-header">
          <h2 class="modal-title">Create Account</h2>
          <p class="modal-subtitle">Join us today</p>
        </div>

        <form class="modal-form" id="register-form" novalidate>
          <div class="form-field">
            <label class="form-field-label" for="reg-name">Full Name</label>
            <div class="form-input-wrap">
              <input type="text" id="reg-name" class="form-input" placeholder="John Doe" autocomplete="name" required />
            </div>
          </div>

          <div class="form-field">
            <label class="form-field-label" for="reg-email">Email Address</label>
            <div class="form-input-wrap">
              <input
                type="email"
                id="reg-email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-field">
            <label class="form-field-label" for="reg-password">Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="reg-password"
                class="form-input"
                placeholder="Create a password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-pw" aria-label="Show or hide password" data-pw-target="reg-password">
                <i class="fa-regular fa-eye-slash"></i>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label class="form-field-label" for="reg-confirm">Confirm Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="reg-confirm"
                class="form-input"
                placeholder="Confirm your password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-pw" aria-label="Show or hide password" data-pw-target="reg-confirm">
                <i class="fa-regular fa-eye-slash"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-modal-submit">Create Account</button>

          <p class="modal-switch-text">
            Already have an account?
            <a href="#" class="modal-switch-link" id="go-to-login">Sign In</a>
          </p>
        </form>
      </div>
    </div>

    <main class="page-backdrop" aria-hidden="true"></main>

   

    <script src="js/script.js"></script>
  </body>
</html>
